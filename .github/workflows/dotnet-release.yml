name: .NET Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 2" # Every Tuesday at 12:00 UTC

permissions:
  contents: read

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.x

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: .release/package-lock.json

      - name: Setup Semantic Release
        run: |
          # semantic-release is pulled from a Git fork; npm pins it as git+ssh in the
          # lockfile, so rewrite to anonymous HTTPS (the CI runner has no SSH key).
          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          npm ci
        working-directory: ./.release

      - name: Semantic Release
        run: ./.release/node_modules/.bin/semantic-release -e ./.release/release.base.mjs -e ./.release/release.main.mjs
        env:
          DEBUG: semantic-release:*
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
          GH_NUGET_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
